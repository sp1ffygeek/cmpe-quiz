entially producing a dangerous middle action (e.g., going straight into the obstacle). Solutions include mixture density networks or discretized action spaces.", "tier": "Tier 4 \u2014 Moderate"}, {"num": 87, "question": "HER creates an \"implicit curriculum\" because:", "options": {"A": "It explicitly schedules goals from easy to hard during training", "B": "It uses a curriculum learning scheduler to adjust the learning rate", "C": "Relabeled goals from nearby achieved states are naturally easier, so the agent learns easy goals first before harder ones", "D": "The replay buffer is sorted by difficulty level"}, "answer": "C", "explanation": "HER's implicit curriculum emerges naturally: early in training, the agent achieves states close to its starting position, so relabeled goals are nearby and easy. As the agent improves and reaches farther states, the relabeled goals become progressively harder, creating an automatic curriculum without explicit scheduling.", "tier": "Tier 4 \u2014 Moderate"}, {"num": 88, "question": "Which of the following is NOT a requirement for HER to work?", "options": {"A": "A goal-conditioned policy $$\\pi(a|s,g)$$", "B": "A mapping function $$m(s)$$ to extract achieved goals from states", "C": "A sparse binary reward function", "D": "An on-policy algorithm like PPO or A2C"}, "answer": "D", "explanation": "HER requires an **off-policy** algorithm (like DDPG, DQN, TD3, or SAC) because it modifies past experiences by relabeling goals. On-policy algorithms cannot reuse modified past data since they require data collected under the current policy. Options A, B, and C are all actual requirements.", "tier": "Tier 4 \u2014 Moderate"}, {"num": 89, "question": "The relationship between the natural gradient and the KL divergence constraint is:", "options": {"A": "The natural gradient ignores KL divergence entirely", "B": "The natural gradient maximizes KL divergence", "C": "The natural gradient minimizes KL divergence between the policy and the optimal policy", "D": "The natural gradient step is equivalent to the steepest ascent direction under a local KL divergence constraint"}, "answer": "D", "explanation": "The natural gradient $$F^{-1}\\nabla J$$ can be derived as the solution to: $$\\max_{\\Delta\\theta} \\nabla J^\\top \\Delta\\theta$$ subject to $$\\Delta\\theta^\\top F \\Delta\\theta \\leq \\epsilon$$. Since $$F$$ is the Hessian of $$D_{KL}$$ at $$\\Delta\\theta = 0$$, this is equivalent to steepest ascent under a local KL constraint \u2014 exactly the TRPO formulation.", "tier": "Tier 4 \u2014 Moderate"}, {"num": 90, "question": "TRPO's line search after the conjugate gradient step is needed to:", "options": {"A": "Ensure the KL constraint is satisfied and the surrogate objective actually improves", "B": "Compute the Fisher Information Matrix", "C": "Find the optimal learning rate for the critic", "D": "Convert the natural gradient to the standard gradient"}, "answer": "A", "explanation": "The CG step computes the direction $$F^{-1}g$$, but the step size must be chosen to satisfy the KL constraint $$D_{KL} \\leq \\delta$$. The line search performs backtracking: it tries progressively smaller step sizes until both the KL constraint is met and the surrogate objective improves.", "tier": "Tier 4 \u2014 Moderate"}, {"num": 91, "question": "Causal confusion in Behavior Cloning refers to:", "options": {"A": "The agent learning the correct causal relationships too slowly", "B": "The agent latching onto spurious correlations instead of true causal features", "C": "Confusion between the reward signal and the state representation", "D": "The inability to distinguish between different expert demonstrators"}, "answer": "B", "explanation": "Causal confusion occurs when the agent identifies correlations in the data that are not causally related to the correct action. For example, a self-driving agent might learn to stop when it sees brake lights of the car ahead, rather than learning to stop based on actual road conditions.", "tier": "Tier 4 \u2014 Moderate"}, {"num": 92, "question": "goalGAIL can outperform the demonstrator because:", "options": {"A": "It uses a larger neural network than the demonstrator", "B": "It trains for more episodes than the demonstrator", "C": "It uses RL optimization (not just supervised learning), allowing it to discover better strategies", "D": "It has access to the environment's reward function"}, "answer": "C", "explanation": "goalGAIL combines goal-conditioned GAIL with HER's relabeling strategy. Because it uses RL optimization (not just supervised learning like BC), it can discover better strategies than the demonstrator provided. Standard BC is fundamentally limited to at best matching the expert's performance.", "tier": "Tier 4 \u2014 Moderate"}, {"num": 93, "question": "In offline RL, \"extrapolation error\" specifically refers to:", "options": {"A": "The error from extrapolating the model beyond the training horizon", "B": "The gap between training and evaluation performance", "C": "The error from using function approximation instead of tabular methods", "D": "Unreliable Q-value estimates for state-action pairs not represented in the offline dataset"}, "answer": "D", "explanation": "Extrapolation error occurs when the Q-function is queried on $$(s,a)$$ pairs outside the offline dataset's distribution. Neural networks can produce arbitrarily wrong outputs for OOD inputs, and the $$\\max$$ operator in Bellman updates systematically selects these overestimated values, causing cascading errors.", "tier": "Tier 4 \u2014 Moderate"}, {"num": 94, "question": "MOPO (Model-based Offline Policy Optimization) modifies the reward function as:", "options": {"A": "$$\\tilde{r}(s,a) = r(s,a) + \\lambda \\cdot u(s,a)$$ (adding uncertainty bonus)", "B": "$$\\tilde{r}(s,a) = r(s,a) \\cdot u(s,a)$$ (scaling by uncertainty)", "C": "$$\\tilde{r}(s,a) = \\max(r(s,a), u(s,a))$$", "D": "$$\\tilde{r}(s,a) = r(s,a) - \\lambda \\cdot u(s,a)$$ (subtracting uncertainty penalty)"}, "answer": "D", "explanation": "MOPO penalizes the reward by the model's uncertainty: $$\\tilde{r}(s,a) = r(s,a) - \\lambda \\cdot u(s,a)$$. This discourages the policy from visiting state-action pairs where the model is uncertain (likely OOD), implementing the pessimism principle in a model-based offline RL framework.", "tier": "Tier 4 \u2014 Moderate"}, {"num": 95, "question": "Which is NOT a valid variance reduction technique for policy gradients?", "options": {"A": "Increasing the discount factor $$\\gamma$$ toward 1", "B": "Subtracting a learned state-dependent baseline $$V_w(s)$$", "C": "Using the advantage function $$A(s,a)$$ instead of $$Q(s,a)$$", "D": "Using Actor-Critic with TD bootstrapping"}, "answer": "A", "explanation": "Increasing $$\\gamma$$ toward 1 actually **increases** variance because the return $$G_t$$ depends on more future rewards, each adding stochasticity. Valid variance reduction techniques include: subtracting a baseline (B), using advantages (C), and bootstrapping via Actor-Critic (D).", "tier": "Tier 4 \u2014 Moderate"}, {"num": 96, "question": "The \"Learning by Cheating\" approach involves:", "options": {"A": "Using reward shaping to make the task easier", "B": "Training a privileged agent with full state access, then distilling into a sensorimotor student", "C": "Copying weights from a pre-trained model on a different task", "D": "Augmenting the training data with adversarial examples"}, "answer": "B", "explanation": "\"Learning by Cheating\" is a two-stage process: first train a privileged agent that has access to ground-truth state information (the \"cheating\" part), then use imitation learning to distill this agent's behavior into a student that only uses raw sensory input (e.g., camera images).", "tier": "Tier 4 \u2014 Moderate"}, {"num": 97, "question": "Which planning method in MBRL does NOT require gradients through the dynamics model?", "options": {"A": "Backpropagation through the model (analytic gradients)", "B": "Policy gradient through learned model rollouts", "C": "CEM (Cross-Entropy Method)", "D": "Collocation with gradient-based optimization"}, "answer": "C", "explanation": "CEM is a derivative-free (gradient-free) optimization method. It uses sampling and elite selection rather than gradient computation. This makes it applicable even when the dynamics model is non-differentiable. The other three methods all require differentiable dynamics.", "tier": "Tier 4 \u2014 Moderate"}, {"num": 98, "question": "If an agent trained with Behavior Cloning has a per-step error rate of $$\\epsilon = 0.01$$ and the trajectory length is $$T = 100$$, the approximate total error is:", "options": {"A": "$$O(0.01)$$ \u2014 approximately 0.01", "B": "$$O(10)$$ \u2014 approximately 10", "C": "$$O(100)$$ \u2014 approximately 100", "D": "$$O(1)$$ \u2014 approximately 1"}, "answer": "C", "explanation": "Using the BC error bound $$O(\\epsilon T^2)$$: $$0.01 \\times 100^2 = 0.01 \\times 10000 = 100$$. This illustrates why BC fails for long horizons \u2014 even a 1% per-step error leads to massive cumulative error over 100 steps.", "tier": "Tier 4 \u2014 Moderate"}, {"num": 99, "question": "Ensemble models in MBRL help address the model exploitation problem by:", "options": {"A": "Providing uncertainty estimates that penalize the policy in regions where the model is unreliable", "B": "Training each model on a different subset of the action space", "C": "Averaging predictions to get a more accurate model", "D": "Allowing parallel training for faster convergence"}, "answer": "A", "explanation": "When ensemble models disagree, it signals high epistemic uncertainty \u2014 the model is unreliable in that region. By penalizing the policy's reward or value estimates in high-uncertainty regions, the agent is discouraged from exploiting model inaccuracies. This directly addresses the model exploitation problem.", "tier": "Tier 4 \u2014 Moderate"}, {"num": 100, "question": "The quality of an offline RL policy is fundamentally bounded by:", "options": {"A": "The size of the neural network used for the Q-function", "B": "The quality and coverage of the offline dataset collected by the behavior policy", "C": "The number of gradient updates performed during training", "D": "The choice of optimizer (Adam vs. SGD)"}, "answer": "B", "explanation": "In offline RL, the agent can only learn from the fixed dataset $$\\mathcal{D}$$. If the behavior policy $$\\beta$$ that collected the data was poor or didn't cover important parts of the state-action space, the learned policy cannot discover better strategies. Dataset quality and coverage are the fundamental bottleneck.", "tier": "Tier 4 \u2014 Moderate"}],
  cmpe256: [{"num": 1, "question": "Cosine Similarity Computation\nGiven $$\\mathbf{x} = (3, 4, 0)$$ and $$\\mathbf{y} = (0, 4, 3)$$, what is $$\\cos(\\mathbf{x}, \\mathbf{y})$$?", "options": {"A": "0.80", "B": "0.64", "C": "0.48", "D": "0.32"}, "answer": "B", "explanation": "$$\\mathbf{x} \\cdot \\mathbf{y} = 0 + 16 + 0 = 16$$. $$\\|\\mathbf{x}\\| = \\sqrt{9+16+0} = 5$$. $$\\|\\mathbf{y}\\| = \\sqrt{0+16+9} = 5$$. $$\\cos = 16/25 = 0.64$$.", "tier": "Tier 1 \u2014 Highest Probability"}, {"num": 2, "question": "Jaccard Similarity\nUsers A and B have purchased items \u2014 A: {1, 3, 5, 7, 9}, B: {2, 3, 5, 7, 8}. What is the Jaccard similarity?", "options": {"A": "0.500", "B": "0.375", "C": "0.600", "D": "3/7 \u2248 0.429"}, "answer": "D", "explanation": "$$A \\cap B = \\{3, 5, 7\\}$$, $$|A \\cap B| = 3$$. $$A \\cup B = \\{1,2,3,5,7,8,9\\}$$, $$|A \\cup B| = 7$$. $$J = 3/7 \\approx 0.429$$.", "tier": "Tier 1 \u2014 Highest Probability"}, {"num": 3, "question": "Pearson Correlation \u2014 Perfect Linear\nUsers X = (2, 4, 6) and Y = (3, 6, 9). What is the Pearson correlation?", "options": {"A": "1.00", "B": "0.87", "C": "0.50", "D": "0.75"}, "answer": "A", "explanation": "$$\\bar{X}=4, \\bar{Y}=6$$. Deviations: X \u2192 (\u22122, 0, 2), Y \u2192 (\u22123, 0, 3). Numerator = 6+0+6 = 12. Denominator = $$\\sqrt{8}\\sqrt{18} = \\sqrt{144} = 12$$. $$r = 12/12 = 1.00$$. Perfect positive linear relationship.", "tier": "Tier 1 \u2014 Highest Probability"}, {"num": 4, "question": "Confusion Matrix \u2014 Precision & Recall\nA classifier produces: TP = 30, FP = 10, FN = 20, TN = 140. What are precision and recall?", "options": {"A": "P = 0.60, R = 0.75", "B": "P = 0.75, R = 0.60", "C": "P = 0.80, R = 0.50", "D": "P = 0.50, R = 0.80"}, "answer": "B", "explanation": "$$P = \\frac{30}{30+10} = \\frac{30}{40} = 0.75$$. $$R = \\frac{30}{30+20} = \\frac{30}{50} = 0.60$$.", "tier": "Tier 1 \u2014 Highest Probability"}, {"num": 5, "question": "User-Based CF \u2014 Weighted Prediction\n$$sim(\\text{Alice}, \\text{Bob}) = 0.8$$, $$sim(\\text{Alice}, \\text{Carol}) = 0.6$$. Bob rated Item X = 2, Carol rated Item X = 5. Using weighted average user-based CF, predict Alice's rating for Item X.", "options": {"A": "3.50", "B": "4.00", "C": "3.29", "D": "2.86"}, "answer": "C", "explanation": "$$\\hat{r} = \\frac{0.8 \\times 2 + 0.6 \\times 5}{0.8 + 0.6} = \\frac{1.6 + 3.0}{1.4} = \\frac{4.6}{1.4} \\approx 3.29$$.", "tier": "Tier 1 \u2014 Highest Probability"}, {"num": 6, "question": "Mean-Centered CF Prediction\nUsing Q5 data with $$\\mu_{\\text{Alice}} = 4.0$$, $$\\mu_{\\text{Bob}} = 3.0$$, $$\\mu_{\\text{Carol}} = 4.5$$. Compute the mean-centered prediction for Alice's rating of Item X.", "options": {"A": "3.29", "B": "4.00", "C": "3.50", "D": "3.64"}, "answer": "D", "explanation": "$$\\hat{r} = 4.0 + \\frac{0.8(2-3.0) + 0.6(5-4.5)}{0.8+0.6} = 4.0 + \\frac{-0.8+0.3}{1.4} = 4.0 + \\frac{-0.5}{1.4} = 4.0 - 0.357 \\approx 3.64$$.", "tier": "Tier 1 \u2014 Highest Probability"}, {"num": 7, "question": "Adjusted Cosine Similarity\nGiven raw ratings and user means:\n\n|       | Item A | Item B | $$\\bar{r}_u$$ |\n|-------|--------|--------|----------------|\n| U1    | 5      | 3      | 4.0            |\n| U2    | 2      | 4      | 3.0            |\n\nCompute the adjusted cosine similarity between Item A and Item B.", "options": {"A": "0.00", "B": "0.50", "C": "\u22121.00", "D": "\u22120.50"}, "answer": "C", "explanation": "Mean-centered: A' = (5\u22124, 2\u22123) = (1, \u22121). B' = (3\u22124, 4\u22123) = (\u22121, 1). Numerator: (1)(\u22121) + (\u22121)(1) = \u22122. Denominator: $$\\sqrt{2}\\sqrt{2} = 2$$. $$sim = -2/2 = -1.00$$.", "tier": "Tier 1 \u2014 Highest Probability"}, {"num": 8, "question": "Item-Based CF Prediction\nUser U has rated: Item X = 4, Item Y = 5. Predict U's rating for Item Z given: $$sim(Z, X) = 0.7$$, $$sim(Z, Y) = 0.3$$. Using item-based weighted average:", "options": {"A": "4.30", "B": "4.50", "C": "4.00", "D": "3.70"}, "answer": "A", "explanation": "$$\\hat{r}_{U,Z} = \\frac{0.7 \\times 4 + 0.3 \\times 5}{0.7 + 0.3} = \\frac{2.8 + 1.5}{1.0} = 4.30$$.", "tier": "Tier 1 \u2014 Highest Probability"}, {"num": 9, "question": "MF \u2014 Rating Prediction from Factor Vectors\nGiven user factor vector $$p_u = (1, 2, 3)$$ and item factor vector $$q_i = (0.5, 0.1, 0.4)$$, what is $$\\hat{r}_{ui} = q_i^T p_u$$?", "options": {"A": "1.50", "B": "1.90", "C": "2.10", "D": "1.70"}, "answer": "B", "explanation": "$$q_i^T p_u = (1)(0.5) + (2)(0.1) + (3)(0.4) = 0.5 + 0.2 + 1.2 = 1.90$$.", "tier": "Tier 1 \u2014 Highest Probability"}, {"num": 10, "question": "Biased MF Prediction\n$$\\mu = 3.7$$, $$b_u = -0.2$$, $$b_i = 0.5$$, $$q_i^T p_u = 0.3$$. What is $$\\hat{r}_{ui}$$?", "options": {"A": "4.0", "B": "3.8", "C": "4.3", "D": "4.5"}, "answer": "C", "explanation": "$$\\hat{r}_{ui} = \\mu + b_u + b_i + q_i^T p_u = 3.7 + (-0.2) + 0.5 + 0.3 = 4.3$$.", "tier": "Tier 1 \u2014 Highest Probability"}, {"num": 11, "question": "PageRank \u2014 No Damping Factor\nDirected graph: A \u2192 B, A \u2192 C, B \u2192 C. Initial $$PR = 1/3$$ each. After one iteration with $$d = 1$$ (no damping), what is $$PR(C)$$?", "options": {"A": "1/6", "B": "1/3", "C": "1/2", "D": "5/6"}, "answer": "C", "explanation": "$$PR(C) = \\frac{PR(A)}{|Out(A)|} + \\frac{PR(B)}{|Out(B)|} = \\frac{1/3}{2} + \\frac{1/3}{1} = 1/6 + 1/3 = 1/2$$.", "tier": "Tier 1 \u2014 Highest Probability"}, {"num": 12, "question": "PageRank \u2014 With Damping Factor\n$$N = 4$$, $$d = 0.8$$. Page $$p_i$$ has one incoming link from $$p_j$$ (which has 2 outgoing links, $$PR(p_j) = 0.4$$). What is $$PR(p_i)$$?", "options": {"A": "0.05", "B": "0.16", "C": "0.37", "D": "0.21"}, "answer": "D", "explanation": "$$PR(p_i) = \\frac{1-0.8}{4} + 0.8 \\cdot \\frac{0.4}{2} = 0.05 + 0.16 = 0.21$$.", "tier": "Tier 1 \u2014 Highest Probability"}, {"num": 13, "question": "Degree Centrality\nIn an undirected graph with 5 nodes, node X is connected to nodes A, B, and C. What is the degree centrality of X?", "options": {"A": "3/4 = 0.75", "B": "3/5 = 0.60", "C": "2/5 = 0.40", "D": "1/3 \u2248 0.33"}, "answer": "A", "explanation": "$$C_D(X) = \\frac{d(X)}{n-1} = \\frac{3}{5-1} = \\frac{3}{4} = 0.75$$.", "tier": "Tier 1 \u2014 Highest Probability"}, {"num": 14, "question": "Clustering Coefficient\nNode $$v$$ has 4 neighbors. Among those 4 neighbors, there are 3 edges connecting them. What is the clustering coefficient?", "options": {"A": "3/4", "B": "1/4", "C": "3/8", "D": "1/2"}, "answer": "D", "explanation": "Max possible edges = $$\\binom{4}{2} = 6$$. Clustering coefficient = $$3/6 = 1/2$$.", "tier": "Tier 1 \u2014 Highest Probability"}, {"num": 15, "question": "F1-Score Computation\nGiven Precision = 0.80 and Recall = 0.60, what is the F1-score?", "options": {"A": "0.70", "B": "0.686", "C": "0.750", "D": "0.800"}, "answer": "B", "explanation": "$$F_1 = \\frac{2 \\times 0.80 \\times 0.60}{0.80 + 0.60} = \\frac{0.96}{1.40} \\approx 0.686$$.", "tier": "Tier 1 \u2014 Highest Probability"}, {"num": 16, "question": "RMSE Computation\nActual ratings: [5, 3, 4, 2], predicted: [4, 3, 5, 3]. What is the RMSE?", "options": {"A": "1.000", "B": "0.750", "C": "0.866", "D": "1.225"}, "answer": "C", "explanation": "Errors: (1, 0, \u22121, \u22121). Squared: (1, 0, 1, 1). Mean = 3/4 = 0.75. $$RMSE = \\sqrt{0.75} \\approx 0.866$$.", "tier": "Tier 1 \u2014 Highest Probability"}, {"num": 17, "question": "Precision@k\nA recommender returns top-5: {A, B, C, D, E}. Relevant items: {A, C, F, G}. What is Precision@5?", "options": {"A": "0.50", "B": "0.60", "C": "0.20", "D": "0.40"}, "answer": "D", "explanation": "Relevant in top-5: {A, C} \u2192 2 items. $$\\text{Precision@5} = 2/5 = 0.40$$.", "tier": "Tier 1 \u2014 Highest Probability"}, {"num": 18, "question": "Recall@k\nSame data as Q17. What is Recall@5?", "options": {"A": "0.50", "B": "0.25", "C": "0.60", "D": "0.40"}, "answer": "A", "explanation": "Relevant found: {A, C} \u2192 2. Total relevant: 4. $$\\text{Recall@5} = 2/4 = 0.50$$.", "tier": "Tier 1 \u2014 Highest Probability"}, {"num": 19, "question": "UCB Computation\nArm has $$\\hat{\\mu}_a = 0.6$$, $$N_a = 4$$, round $$t = 100$$, $$c = 1$$. Use $$\\ln(100) \\approx 4.6$$. What is the UCB score?", "options": {"A": "1.07", "B": "1.67", "C": "0.60", "D": "2.07"}, "answer": "B", "explanation": "UCB = $$0.6 + 1 \\cdot \\sqrt{4.6/4} = 0.6 + \\sqrt{1.15} = 0.6 + 1.07 = 1.67$$.", "tier": "Tier 1 \u2014 Highest Probability"}, {"num": 20, "question": "Thompson Sampling Update\nAn arm starts with Beta(1, 1). After 3 successes and 2 failures, what is the posterior?", "options": {"A": "Beta(3, 2)", "B": "Beta(4, 3)", "C": "Beta(1, 1)", "D": "Beta(3, 3)"}, "answer": "B", "explanation": "$$\\alpha = 1 + 3 = 4$$, $$\\beta = 1 + 2 = 3$$. Posterior = Beta(4, 3).", "tier": "Tier 1 \u2014 Highest Probability"}, {"num": 21, "question": "Betweenness Centrality \u2014 Star Graph\nStar graph: center C connected to 4 leaves (A, B, D, E). What is the betweenness centrality of C?", "options": {"A": "4", "B": "3", "C": "6", "D": "0"}, "answer": "C", "explanation": "Every shortest path between leaf pairs passes through C. Leaf pairs = $$\\binom{4}{2} = 6$$. Each contributes 1. $$C_B(C) = 6$$.", "tier": "Tier 1 \u2014 Highest Probability"}, {"num": 22, "question": "Closeness Centrality\nGraph with 4 nodes. Shortest-path distances from X to A, B, C are 1, 2, 3. What is closeness centrality of X?", "options": {"A": "1/6", "B": "1/2", "C": "2/3", "D": "1/3"}, "answer": "B", "explanation": "$$C_C(X) = \\frac{n-1}{\\sum d(X,j)} = \\frac{3}{1+2+3} = \\frac{3}{6} = 0.5$$.", "tier": "Tier 1 \u2014 Highest Probability"}, {"num": 23, "question": "Regret Computation\nOver $$T = 10$$ rounds, optimal arm mean $$\\mu^* = 0.8$$. Agent's total reward = 6.0. What is regret?", "options": {"A": "0.8", "B": "6.0", "C": "8.0", "D": "2.0"}, "answer": "D", "explanation": "$$R_T = T\\mu^* - \\sum \\mu_{a_t} = 10(0.8) - 6.0 = 8.0 - 6.0 = 2.0$$.", "tier": "Tier 1 \u2014 Highest Probability"}, {"num": 24, "question": "SGD Error in MF\n$$q_i = (1.0, 0.5)$$, $$p_u = (0.8, 0.4)$$, $$r_{ui} = 4.0$$. What is $$e_{ui}$$?", "options": {"A": "3.0", "B": "2.8", "C": "2.5", "D": "1.0"}, "answer": "A", "explanation": "$$q_i^T p_u = 0.8 + 0.2 = 1.0$$. $$e_{ui} = 4.0 - 1.0 = 3.0$$.", "tier": "Tier 1 \u2014 Highest Probability"}, {"num": 25, "question": "Sparsity Computation\n10,000 users, 50,000 movies. Average user rated 50 movies. What percentage of the matrix is filled?", "options": {"A": "0.1%", "B": "1.0%", "C": "0.5%", "D": "5.0%"}, "answer": "A", "explanation": "Total = $$10{,}000 \\times 50{,}000 = 500{,}000{,}000$$. Filled = $$10{,}000 \\times 50 = 500{,}000$$. $$500{,}000/500{,}000{,}000 = 0.001 = 0.1\\%$$.", "tier": "Tier 1 \u2014 Highest Probability"}, {"num": 26, "question": "Min-Max Normalization\nFeature range [20, 100]. What is the normalized value of 60?", "options": {"A": "0.60", "B": "0.75", "C": "0.40", "D": "0.50"}, "answer": "D", "explanation": "$$x' = \\frac{60 - 20}{100 - 20} = \\frac{40}{80} = 0.50$$.", "tier": "Tier 1 \u2014 Highest Probability"}, {"num": 27, "question": "Specificity Computation\nTP = 50, FP = 30, FN = 10, TN = 110. What is the specificity?", "options": {"A": "0.833", "B": "0.786", "C": "0.625", "D": "0.550"}, "answer": "B", "explanation": "$$\\text{Specificity} = \\frac{TN}{TN+FP} = \\frac{110}{140} \\approx 0.786$$.", "tier": "Tier 1 \u2014 Highest Probability"}, {"num": 28, "question": "GMF Element-wise Product\nUser embedding $$p_u = (0.5, 0.8, 0.3)$$, item embedding $$q_i = (0.4, 0.5, 1.0)$$. What is $$\\phi^{GMF} = p_u \\odot q_i$$?", "options": {"A": "(0.9, 1.3, 1.3)", "B": "(0.1, 0.3, 0.7)", "C": "(0.20, 0.40, 0.30)", "D": "(0.50, 0.80, 0.30)"}, "answer": "C", "explanation": "Element-wise: $$(0.5 \\times 0.4, 0.8 \\times 0.5, 0.3 \\times 1.0) = (0.20, 0.40, 0.30)$$.", "tier": "Tier 1 \u2014 Highest Probability"}, {"num": 29, "question": "Normalized Betweenness Centrality\nUndirected graph, $$n = 5$$, $$C_B(v) = 6$$. What is $$C_B'(v)$$?", "options": {"A": "0.25", "B": "0.50", "C": "0.75", "D": "1.0"}, "answer": "D", "explanation": "$$C_B'(v) = \\frac{2 \\times 6}{(5-1)(5-2)} = \\frac{12}{12} = 1.0$$.", "tier": "Tier 1 \u2014 Highest Probability"}, {"num": 30, "question": "Full Biased MF Prediction\n$$\\mu = 3.0$$, $$b_u = 0.4$$, $$b_i = -0.2$$, $$p_u = (2, 1)$$, $$q_i = (0.5, 0.6)$$. Compute $$\\hat{r}_{ui}$$.", "options": {"A": "3.60", "B": "4.20", "C": "5.40", "D": "4.80"}, "answer": "D", "explanation": "$$q_i^T p_u = 1.0 + 0.6 = 1.6$$. $$\\hat{r}_{ui} = 3.0 + 0.4 - 0.2 + 1.6 = 4.8$$.", "tier": "Tier 1 \u2014 Highest Probability"}, {"num": 31, "question": "\ud83c\udfaf Multi-Class Confusion Matrix (3\u00d73 \u2014 Dog/Cat/Rabbit)\nA classifier for 3 classes produces this confusion matrix:\n\n|  | Pred Dog | Pred Cat | Pred Rabbit |\n|--|----------|----------|-------------|\n| **Actual Dog** | 40 | 5 | 5 |\n| **Actual Cat** | 10 | 30 | 10 |\n| **Actual Rabbit** | 5 | 5 | 40 |\n\nWhat is the precision for the \"Dog\" class?", "options": {"A": "40/50 = 0.80", "B": "40/55 \u2248 0.727", "C": "40/45 \u2248 0.889", "D": "40/150 \u2248 0.267"}, "answer": "B", "explanation": "Precision for Dog = $$\\frac{\\text{TP}_{\\text{Dog}}}{\\text{Total predicted as Dog}}$$. Column \"Pred Dog\": 40 + 10 + 5 = 55. Precision = 40/55 \u2248 0.727. **Trap:** Students often use the row (recall) instead of the column (precision).", "tier": "Tier 2 \u2014 High Probability"}, {"num": 32, "question": "\ud83c\udfaf Missing Confusion Matrix Values\nA binary classifier tested on 200 samples: TP = 60, TN = ?, FP = 15, FN = ?. Recall = 0.75. Find FN and TN.", "options": {"A": "FN = 20, TN = 105", "B": "FN = 15, TN = 110", "C": "FN = 25, TN = 100", "D": "FN = 30, TN = 95"}, "answer": "A", "explanation": "Recall = TP/(TP+FN) \u2192 0.75 = 60/(60+FN) \u2192 FN = 20. Total = 200 = 60+TN+15+20 \u2192 TN = 105.", "tier": "Tier 2 \u2014 High Probability"}, {"num": 33, "question": "\ud83c\udfaf Mean-Centered Ratings \u2014 Cold-Start Edge Case\nUser A has rated only 1 item (rating = 5). What is the mean-centered rating for that item?", "options": {"A": "5.0", "B": "0.0", "C": "Cannot be computed", "D": "1.0"}, "answer": "B", "explanation": "$$\\bar{r}_A = 5.0$$. Mean-centered = $$5 - 5 = 0$$. With only one rating, mean-centering always produces 0, making the user's deviation uninformative. This is a cold-start edge case.", "tier": "Tier 2 \u2014 High Probability"}, {"num": 34, "question": "\ud83c\udfaf High Accuracy, Terrible Minority Precision\nA spam detector on 1000 emails (950 ham, 50 spam) predicts everything as ham. What are accuracy and spam precision?", "options": {"A": "Accuracy = 95%, Spam Precision = 0%", "B": "Accuracy = 95%, Spam Precision = 95%", "C": "Accuracy = 50%, Spam Precision = 50%", "D": "Accuracy = 100%, Spam Precision = 100%"}, "answer": "A", "explanation": "Predicting all ham: 950 correct out of 1000 = 95% accuracy. But zero spam predictions made, so spam precision = 0/0 (undefined/0%). **Classic imbalanced-class trap.**", "tier": "Tier 2 \u2014 High Probability"}, {"num": 35, "question": "\ud83c\udfaf Pearson vs. Cosine \u2014 When They Disagree\nUser A = (5, 5, 5), User B = (1, 1, 1). What are cosine similarity and Pearson correlation?", "options": {"A": "Cosine = 1.0, Pearson = undefined", "B": "Cosine = 0.0, Pearson = 1.0", "C": "Cosine = 1.0, Pearson = 1.0", "D": "Cosine = 0.33, Pearson = 0.0"}, "answer": "A", "explanation": "Cosine: parallel vectors \u2192 1.0. Pearson: deviations all zero (zero variance) \u2192 division by zero \u2192 undefined. This shows why Pearson fails when a user gives identical ratings to everything.", "tier": "Tier 2 \u2014 High Probability"}, {"num": 36, "question": "\ud83c\udfaf PageRank \u2014 Dead End Behavior\nGraph: A \u2192 B, B \u2192 C, C has no outgoing links. Without damping ($$d=1$$), what happens after many iterations?", "options": {"A": "All PageRank accumulates at C", "B": "PageRank distributes equally", "C": "PageRank oscillates", "D": "All PageRank accumulates at A"}, "answer": "A", "explanation": "C is a dead end \u2014 receives rank but never passes it on. Rank flows A\u2192B\u2192C and gets stuck. Eventually $$PR(C) \\to 1.0$$, others \u2192 0. Damping factor solves this via teleportation.", "tier": "Tier 2 \u2014 High Probability"}, {"num": 37, "question": "\ud83c\udfaf Cross-Module: New-Item Cold-Start\nA brand-new movie with genre metadata but zero ratings. Which method can recommend it?", "options": {"A": "User-based CF", "B": "Item-based CF", "C": "Content-based filtering", "D": "Matrix factorization"}, "answer": "C", "explanation": "CF methods (A, B, D) all require ratings. Content-based uses item features (genre, director) to match user profiles \u2014 works with zero ratings.", "tier": "Tier 2 \u2014 High Probability"}, {"num": 38, "question": "\ud83c\udfaf Tricky Similarity \u2014 Normalization Matters\nU1 = (1, 1, 1), U2 = (5, 5, 5). Raw cosine similarity?", "options": {"A": "0.0", "B": "0.5", "C": "1.0", "D": "\u22121.0"}, "answer": "C", "explanation": "Parallel vectors \u2192 cos = 1.0. $$\\frac{5+5+5}{\\sqrt{3}\\sqrt{75}} = \\frac{15}{15} = 1.0$$. **Trap:** Cosine says these users are identical even though one rates everything 1 and the other 5. This is why adjusted cosine/Pearson are preferred.", "tier": "Tier 2 \u2014 High Probability"}, {"num": 39, "question": "\ud83c\udfaf Spider Trap Without Damping\nGraph: A \u2192 B, B \u2192 A (cycle), C \u2192 A. Without damping, what happens?", "options": {"A": "Equal distribution", "B": "A and B absorb all PageRank; C gets 0", "C": "C absorbs all PageRank", "D": "Algorithm diverges"}, "answer": "B", "explanation": "C sends rank to A but never receives any back. A\u2194B form a spider trap. Eventually all rank concentrates in {A, B}, $$PR(C) \\to 0$$.", "tier": "Tier 2 \u2014 High Probability"}, {"num": 40, "question": "\ud83c\udfaf UCB \u2014 Under-Explored Arm Wins\nArm 1: $$\\hat{\\mu}_1 = 0.7, N_1 = 10$$. Arm 2: $$\\hat{\\mu}_2 = 0.5, N_2 = 2$$. $$t = 50, c = 1, \\ln(50) \\approx 3.9$$. Which arm does UCB select?", "options": {"A": "Arm 1 (higher mean)", "B": "Arm 2 (higher UCB score)", "C": "Both tied", "D": "Random selection"}, "answer": "B", "explanation": "Arm 1: $$0.7 + \\sqrt{3.9/10} = 1.32$$. Arm 2: $$0.5 + \\sqrt{3.9/2} = 1.90$$. UCB selects Arm 2 despite lower mean \u2014 it's under-explored.", "tier": "Tier 2 \u2014 High Probability"}, {"num": 41, "question": "\ud83c\udfaf Cross-Module: Exploration-Exploitation\nWhich RecSys approach inherently addresses exploration-exploitation?", "options": {"A": "Item-based CF", "B": "Matrix factorization", "C": "Multi-armed bandits", "D": "Content-based filtering"}, "answer": "C", "explanation": "Bandits explicitly balance exploring new items vs. exploiting known good ones. CF and MF are purely exploitative.", "tier": "Tier 2 \u2014 High Probability"}, {"num": 42, "question": "\ud83c\udfaf Adjusted Cosine \u2014 Three Users\n|       | Item P | Item Q | $$\\bar{r}_u$$ |\n|-------|--------|--------|----------------|\n| U1    | 5      | 4      | 4.0            |\n| U2    | 3      | 4      | 3.0            |\n| U3    | 4      | 2      | 3.0            |\n\nAdjusted cosine between P and Q?", "options": {"A": "0.00", "B": "0.50", "C": "1.00", "D": "\u22120.50"}, "answer": "D", "explanation": "P' = (1, 0, 1), Q' = (0, 1, \u22121). Num = 0+0\u22121 = \u22121. Den = $$\\sqrt{2}\\sqrt{2} = 2$$. sim = \u22120.50.", "tier": "Tier 2 \u2014 High Probability"}, {"num": 43, "question": "\ud83c\udfaf RMSE vs. MAE \u2014 Outlier Sensitivity\nErrors: [0, 0, 0, 4]. What are MAE and RMSE?", "options": {"A": "MAE = 1.0, RMSE = 2.0", "B": "MAE = 2.0, RMSE = 2.0", "C": "MAE = 1.0, RMSE = 1.0", "D": "MAE = 4.0, RMSE = 4.0"}, "answer": "A", "explanation": "MAE = 4/4 = 1.0. RMSE = $$\\sqrt{16/4} = 2.0$$. RMSE doubles because squaring amplifies the outlier.", "tier": "Tier 2 \u2014 High Probability"}, {"num": 44, "question": "\ud83c\udfaf Filter Bubble Problem\nWhich approach is MOST susceptible to creating a filter bubble?", "options": {"A": "Collaborative filtering", "B": "Content-based filtering", "C": "Multi-armed bandits", "D": "Hybrid methods"}, "answer": "B", "explanation": "Content-based only recommends items similar to past preferences (overspecialization). CF can surface items liked by similar users. Bandits explore. Hybrids mitigate.", "tier": "Tier 2 \u2014 High Probability"}, {"num": 45, "question": "\ud83c\udfaf Large \u03bb in MF\nIf $$\\lambda$$ is very large in regularized MF, what happens?", "options": {"A": "Overfitting", "B": "Faster training", "C": "Latent factors \u2192 zero, underfitting", "D": "Regularization ignored"}, "answer": "C", "explanation": "Large $$\\lambda$$ forces $$\\|q_i\\|, \\|p_u\\| \\to 0$$. Predictions collapse to $$\\mu + b_u + b_i$$ only.", "tier": "Tier 2 \u2014 High Probability"}, {"num": 46, "question": "\ud83c\udfaf PageRank Multi-Source\n$$N=3, d=0.85$$. C gets links from A (1 out-link, PR=0.3) and B (3 out-links, PR=0.6). What is PR(C)?", "options": {"A": "0.475", "B": "0.22", "C": "0.05", "D": "0.37"}, "answer": "A", "explanation": "$$PR(C) = \\frac{0.15}{3} + 0.85(\\frac{0.3}{1} + \\frac{0.6}{3}) = 0.05 + 0.85(0.5) = 0.475$$.", "tier": "Tier 2 \u2014 High Probability"}, {"num": 47, "question": "\ud83c\udfaf User-Based vs. Item-Based Scalability\n10M users, 100K items. Which CF is more scalable?", "options": {"A": "User-based CF", "B": "Item-based CF", "C": "Both equal", "D": "Neither \u2014 must use content-based"}, "answer": "B", "explanation": "User-based: $$O(U^2) = O(10^{14})$$. Item-based: $$O(I^2) = O(10^{10})$$ \u2014 10,000\u00d7 fewer comparisons, plus precomputable.", "tier": "Tier 2 \u2014 High Probability"}, {"num": 48, "question": "\ud83c\udfaf Positive-Only Neighbors\n$$sim(U1,U2) = 0.9$$, $$sim(U1,U3) = -0.5$$. U2 rated M = 3, U3 rated M = 5. Weighted average with positive-only similarities?", "options": {"A": "3.67", "B": "3.00", "C": "4.00", "D": "5.00"}, "answer": "B", "explanation": "Exclude U3 (negative sim). $$\\hat{r} = \\frac{0.9 \\times 3}{0.9} = 3.0$$.", "tier": "Tier 2 \u2014 High Probability"}, {"num": 49, "question": "\ud83c\udfaf NeuMF Pre-Sigmoid\nGMF output = (0.2, 0.4), MLP output = (0.5, 0.3, 0.1). Weights h = (1,1,1,1,1). What is $$h^T[\\phi^{GMF}; \\phi^{MLP}]$$?", "options": {"A": "0.30", "B": "0.75", "C": "1.50", "D": "2.00"}, "answer": "C", "explanation": "0.2+0.4+0.5+0.3+0.1 = 1.50.", "tier": "Tier 2 \u2014 High Probability"}, {"num": 50, "question": "\ud83c\udfaf Edge Betweenness \u2014 Path Graph\nPath A\u2014B\u2014C\u2014D\u2014E. How many shortest paths through edge B\u2014C?", "options": {"A": "4", "B": "6", "C": "3", "D": "8"}, "answer": "B", "explanation": "Left {A,B} \u00d7 Right {C,D,E} = 2\u00d73 = 6 paths cross B\u2014C.", "tier": "Tier 2 \u2014 High Probability"}, {"num": 51, "question": "\ud83c\udfaf Best Method for Implicit Feedback\nWhich MF optimization is designed for implicit feedback?", "options": {"A": "SGD with explicit ratings", "B": "ALS with confidence weights", "C": "Standard SVD", "D": "Pearson-based CF"}, "answer": "B", "explanation": "ALS uses confidence weights \u2014 more interactions = more confidence, not higher rating. Specifically designed for implicit data.", "tier": "Tier 2 \u2014 High Probability"}, {"num": 52, "question": "\ud83c\udfaf Cosine on Binary Vectors\n$$\\mathbf{a} = (1,1,0,1,0)$$, $$\\mathbf{b} = (1,0,1,1,1)$$. Cosine similarity?", "options": {"A": "0.516", "B": "0.408", "C": "0.667", "D": "0.577"}, "answer": "D", "explanation": "Dot = 2. $$\\|\\mathbf{a}\\| = \\sqrt{3}$$, $$\\|\\mathbf{b}\\| = 2$$. $$\\cos = 2/(2\\sqrt{3}) = 1/\\sqrt{3} \\approx 0.577$$.", "tier": "Tier 2 \u2014 High Probability"}, {"num": 53, "question": "\ud83c\udfaf \u03b5-Greedy Exploitation Rate\n\u03b5-greedy with $$\\varepsilon = 0.1$$. What fraction exploits?", "options": {"A": "10%", "B": "50%", "C": "100%", "D": "90%"}, "answer": "D", "explanation": "Exploit = $$1 - 0.1 = 0.9 = 90\\%$$.", "tier": "Tier 2 \u2014 High Probability"}, {"num": 54, "question": "\ud83c\udfaf Matrix Reconstruction Entry\n$$P = \\begin{pmatrix} 1 & 2 \\\\ 3 & 1 \\end{pmatrix}$$, $$Q = \\begin{pmatrix} 1 & 2 \\\\ 0 & 1 \\end{pmatrix}$$. $$\\hat{r}_{21}$$ in $$PQ^T$$?", "options": {"A": "3", "B": "5", "C": "4", "D": "7"}, "answer": "B", "explanation": "Row 2 of P = (3,1). Col 1 of $$Q^T$$ = (1,2). $$3(1)+1(2) = 5$$.", "tier": "Tier 2 \u2014 High Probability"}, {"num": 55, "question": "\ud83c\udfaf Why RMSE/MAE Insufficient for RecSys\nWhy are RMSE/MAE insufficient for evaluating recommender systems?", "options": {"A": "Too computationally expensive", "B": "Only measure classification accuracy", "C": "Measure prediction accuracy but not ranking quality of top-k", "D": "Require unavailable labeled data"}, "answer": "C", "explanation": "Users only see top-k items. A system with low RMSE may still rank poorly. NDCG, Precision@k better reflect user experience.", "tier": "Tier 2 \u2014 High Probability"}, {"num": 56, "question": "Why Adjusted Cosine for Item-Based CF?\nWhy does item-based CF use adjusted cosine instead of raw cosine?", "options": {"A": "Raw cosine is more expensive", "B": "Adjusted cosine accounts for different users' rating scales by mean-centering per user", "C": "Raw cosine can't handle missing values", "D": "Adjusted cosine always gives higher values"}, "answer": "B", "explanation": "Different users have different baselines (generous vs. harsh raters). Adjusted cosine subtracts each user's mean before computing similarity, comparing relative preferences.", "tier": "Tier 3 \u2014 Moderate-High"}, {"num": 57, "question": "MF vs. SVD\nWhy can't standard SVD be directly applied to the user-item matrix?", "options": {"A": "SVD is too slow", "B": "SVD requires a complete matrix, but rating matrices are sparse", "C": "SVD only handles binary data", "D": "SVD doesn't produce latent factors"}, "answer": "B", "explanation": "SVD needs all entries defined. MF overcomes this by optimizing only over observed entries $$(u,i) \\in K$$.", "tier": "Tier 3 \u2014 Moderate-High"}, {"num": 58, "question": "Content-Based Advantage\nWhich is an advantage of content-based filtering over CF?", "options": {"A": "Works well even with extremely sparse utility matrices", "B": "Discovers items outside user's preferences", "C": "Leverages wisdom of the crowd", "D": "Requires no feature engineering"}, "answer": "A", "explanation": "Content-based uses item features and individual user profiles \u2014 not other users' ratings. Sparsity doesn't affect it.", "tier": "Tier 3 \u2014 Moderate-High"}, {"num": 59, "question": "NDCG \u2014 Why Position Matters\nIn NDCG, why are higher-ranked items given more weight?", "options": {"A": "Higher-ranked items are always more relevant", "B": "It simplifies computation", "C": "Users are more likely to examine items at the top of the list", "D": "Lower-ranked items have no relevance"}, "answer": "C", "explanation": "NDCG uses $$\\frac{1}{\\log_2(i+1)}$$ discount \u2014 models the fact that users pay more attention to top results.", "tier": "Tier 3 \u2014 Moderate-High"}, {"num": 60, "question": "Utility Matrix \u2014 Missing Entries\nWhat does a missing entry in the utility matrix represent?", "options": {"A": "User disliked the item", "B": "Rating is zero", "C": "User has not yet interacted with the item", "D": "Item was removed"}, "answer": "C", "explanation": "Missing \u2260 zero. CF's goal is to predict these missing values.", "tier": "Tier 3 \u2014 Moderate-High"}, {"num": 61, "question": "Implicit vs. Explicit Feedback\nWhich is an example of implicit feedback?", "options": {"A": "4 out of 5 stars", "B": "Written review saying \"loved it\"", "C": "Thumbs up on a video", "D": "Clicking a product and browsing for 5 minutes"}, "answer": "D", "explanation": "Implicit feedback is inferred from behavior (clicks, time, purchases) without explicit rating. A, B, C are explicit.", "tier": "Tier 3 \u2014 Moderate-High"}, {"num": 62, "question": "Neighborhood Size Trade-off\nIn user-based CF, what happens if neighborhood $$k$$ is too large?", "options": {"A": "More personalized predictions", "B": "Only most similar user considered", "C": "System runs out of memory", "D": "Predictions become noisier from dissimilar users"}, "answer": "D", "explanation": "Large $$k$$ includes low-similarity users, diluting signal from truly similar neighbors.", "tier": "Tier 3 \u2014 Moderate-High"}, {"num": 63, "question": "AUC Interpretation\nAn AUC of 0.50 indicates:", "options": {"A": "Perfect classifier", "B": "Perfect precision", "C": "Zero false positives", "D": "No better than random guessing"}, "answer": "D", "explanation": "AUC = 0.5 means ROC curve lies on the diagonal \u2014 no discriminative ability.", "tier": "Tier 3 \u2014 Moderate-High"}, {"num": 64, "question": "Holdout Method Disadvantage\nMain disadvantage of simple holdout evaluation?", "options": {"A": "Computationally expensive", "B": "Always leads to overfitting", "C": "High variance \u2014 results depend on the particular random split", "D": "Uses all data for training"}, "answer": "C", "explanation": "A single random split may not be representative, especially with small datasets.", "tier": "Tier 3 \u2014 Moderate-High"}, {"num": 65, "question": "Cross-Validation Advantage\nPrimary advantage of k-fold CV over single holdout?", "options": {"A": "Faster to compute", "B": "Requires less data", "C": "Eliminates need for test set", "D": "Every data point used for both training and testing, reducing variance"}, "answer": "D", "explanation": "Each fold serves as test set once. All data contributes to both training and evaluation.", "tier": "Tier 3 \u2014 Moderate-High"}, {"num": 66, "question": "A/B Testing Disadvantage\nKey disadvantage of A/B testing for RecSys?", "options": {"A": "Cannot measure user satisfaction", "B": "Requires exposing real users to potentially inferior system", "C": "Identical to offline evaluation", "D": "Doesn't use real user data"}, "answer": "B", "explanation": "Users in treatment group may get worse recommendations. Must run long enough for statistical significance.", "tier": "Tier 3 \u2014 Moderate-High"}, {"num": 67, "question": "Pearson vs. Cosine Advantage\nWhat advantage does Pearson have over raw cosine for comparing user ratings?", "options": {"A": "Faster to compute", "B": "Works only with binary data", "C": "Accounts for each user's mean rating, handling different scales", "D": "Ignores magnitude entirely"}, "answer": "C", "explanation": "Pearson subtracts each user's mean (effectively mean-centering). Handles generous vs. harsh raters.", "tier": "Tier 3 \u2014 Moderate-High"}, {"num": 68, "question": "Offline Evaluation Limitation\nWhich limitation is specific to offline evaluation of RecSys?", "options": {"A": "Cannot measure novelty, serendipity, or actual user satisfaction", "B": "Requires real-time traffic", "C": "Too expensive to run", "D": "Always produces biased results"}, "answer": "A", "explanation": "Offline uses historical data only. Can't capture whether users enjoy novel or surprising recommendations.", "tier": "Tier 3 \u2014 Moderate-High"}, {"num": 69, "question": "SGD vs. ALS\nWhich correctly contrasts SGD and ALS for MF?", "options": {"A": "SGD is parallelizable; ALS is sequential", "B": "ALS is better for implicit feedback and is parallelizable", "C": "SGD requires complete matrix", "D": "ALS always converges faster"}, "answer": "B", "explanation": "ALS fixes one matrix, solves the other in closed form \u2014 parallelizable. Handles implicit data with confidence weights.", "tier": "Tier 3 \u2014 Moderate-High"}, {"num": 70, "question": "Latent Factors Interpretation\nIn MF for movies, latent factors might correspond to:", "options": {"A": "Explicit genre tags from users", "B": "Number of ratings per movie", "C": "Hidden dimensions like \"how much action\" or \"how serious\"", "D": "Release year"}, "answer": "C", "explanation": "Latent factors are learned automatically \u2014 abstract dimensions of taste discovered from data.", "tier": "Tier 3 \u2014 Moderate-High"}, {"num": 71, "question": "Bias Term Interpretation\nIn $$\\hat{r}_{ui} = \\mu + b_u + b_i + q_i^T p_u$$, if $$b_u = -0.5$$, what does this mean?", "options": {"A": "User tends to rate 0.5 below global average", "B": "User rated 0.5 fewer items than average", "C": "User's latent vector has magnitude 0.5", "D": "User prefers items with negative bias"}, "answer": "A", "explanation": "$$b_u$$ captures systematic tendency to rate above/below $$\\mu$$. Negative = \"tough rater.\"", "tier": "Tier 3 \u2014 Moderate-High"}, {"num": 72, "question": "Increasing Latent Factors\nIncreasing $$f$$ in MF will:", "options": {"A": "Always improve test accuracy", "B": "Increase capacity but risk overfitting if too large", "C": "Decrease training time", "D": "Have no effect"}, "answer": "B", "explanation": "More factors capture finer patterns but can memorize noise. Use cross-validation to select $$f$$.", "tier": "Tier 3 \u2014 Moderate-High"}, {"num": 73, "question": "Real Networks vs. Random Graphs\nWhich is NOT a characteristic of real-world networks vs. random graphs?", "options": {"A": "Power-law degree distribution", "B": "High clustering coefficient", "C": "Small-world property", "D": "Uniform (Poisson) degree distribution"}, "answer": "D", "explanation": "Random graphs have Poisson distributions. Real networks have power-law (scale-free) with hubs.", "tier": "Tier 3 \u2014 Moderate-High"}, {"num": 74, "question": "Bipartite Graph Property\nWhich statement about bipartite graphs is TRUE?", "options": {"A": "Can contain odd-length cycles", "B": "Every node has same degree", "C": "Must have exactly two edges", "D": "Cannot contain odd-length cycles"}, "answer": "D", "explanation": "Edges alternate between two sets \u2192 cycles must have even length. A graph is bipartite iff it has no odd cycles.", "tier": "Tier 3 \u2014 Moderate-High"}, {"num": 75, "question": "Strongly Connected Graph\nDirected graph: A\u2192B, B\u2192C, C\u2192A. This graph is:", "options": {"A": "Weakly connected only", "B": "Neither strongly nor weakly", "C": "Strongly connected", "D": "Disconnected"}, "answer": "C", "explanation": "Every node reachable from every other via directed edges (A\u2192B\u2192C\u2192A cycle). Strongly connected \u2282 weakly connected.", "tier": "Tier 3 \u2014 Moderate-High"}, {"num": 76, "question": "Power-Law Degree Distribution\nIn a power-law network:", "options": {"A": "Most nodes have very high degree", "B": "A few hubs have very high degree; most nodes have low degree", "C": "Degree follows a bell curve", "D": "All nodes have approximately equal degree"}, "answer": "B", "explanation": "$$P(k) \\propto k^{-\\gamma}$$ \u2014 long tail with rare hubs (e.g., Google in web graph).", "tier": "Tier 3 \u2014 Moderate-High"}, {"num": 77, "question": "Small-World Property\nThe \"small-world\" property means:", "options": {"A": "Network has very few nodes", "B": "Every node directly connected to every other", "C": "Average path length is surprisingly short despite large network size", "D": "Network has low diameter"}, "answer": "C", "explanation": "\"Six degrees of separation\" \u2014 even in million-node networks, average shortest path is small (often logarithmic).", "tier": "Tier 3 \u2014 Moderate-High"}, {"num": 78, "question": "Dead Ends in PageRank\nA \"dead end\" in PageRank is:", "options": {"A": "Page with no incoming links", "B": "Page linking only to itself", "C": "Page with equal in/out links", "D": "Page with no outgoing links \u2014 causes rank to \"leak\""}, "answer": "D", "explanation": "Random surfer reaches dead end with nowhere to go. Total PageRank decreases each iteration. Damping/teleportation fixes this.", "tier": "Tier 3 \u2014 Moderate-High"}, {"num": 79, "question": "PageRank Advantage\nKey advantage of PageRank:", "options": {"A": "Query-dependent rankings", "B": "Requires real-time computation", "C": "Query-independent and precomputable", "D": "Assigns equal rank in strongly connected components"}, "answer": "C", "explanation": "Computed offline from link structure. Efficient at query time. But query-independence is also a criticism.", "tier": "Tier 3 \u2014 Moderate-High"}, {"num": 80, "question": "PageRank Criticism\nValid criticism of PageRank:", "options": {"A": "Query-independent \u2014 doesn't consider relevance to specific queries", "B": "Can't handle cycles", "C": "Always assigns highest rank to most outgoing links", "D": "Too expensive to ever be practical"}, "answer": "A", "explanation": "PageRank gives one global score per page regardless of query. A high-PR page may be irrelevant to a specific search. Combined with TF-IDF in practice.", "tier": "Tier 3 \u2014 Moderate-High"}, {"num": 81, "question": "LightGCN \u2014 Final Embedding\nIn LightGCN with $$K = 3$$ layers and uniform $$\\alpha_k = 1/(K+1)$$, the final embedding is:", "options": {"A": "Only layer 3 output", "B": "Average of layers 1\u20133 only", "C": "Concatenation of all layers", "D": "$$e_u = \\frac{1}{4}(e_u^{(0)} + e_u^{(1)} + e_u^{(2)} + e_u^{(3)})$$"}, "answer": "D", "explanation": "LightGCN combines all layers 0 through K. With K=3 and uniform weights: $$e_u = \\frac{1}{4}\\sum_{k=0}^{3} e_u^{(k)}$$. Layer 0 preserves node identity.", "tier": "Tier 4 \u2014 Moderate"}, {"num": 82, "question": "LightGCN \u2014 Prediction Method\nHow does LightGCN compute predicted scores?", "options": {"A": "Concatenation + MLP", "B": "Euclidean distance", "C": "Dot product of final embeddings: $$\\hat{y}_{ui} = e_u^T e_i$$", "D": "Cosine similarity"}, "answer": "C", "explanation": "Simple dot product \u2014 no additional NN layers after graph convolution. Simplicity is a key design choice.", "tier": "Tier 4 \u2014 Moderate"}, {"num": 83, "question": "LightGCN vs. Standard GCN\nLightGCN differs from standard GCN by:", "options": {"A": "Using attention mechanisms", "B": "Removing non-linear activations and feature transformation matrices", "C": "Adding more layers", "D": "Using non-bipartite graphs"}, "answer": "B", "explanation": "LightGCN found these unnecessary for CF. Simpler design improves both performance and efficiency.", "tier": "Tier 4 \u2014 Moderate"}, {"num": 84, "question": "BPR Loss \u2014 Positive vs. Negative Edges\nIn LightGCN's BPR loss, \"positive\" and \"negative\" edges are:", "options": {"A": "High-weight vs. low-weight edges", "B": "Similar vs. dissimilar nodes", "C": "Observed interactions vs. sampled non-interactions", "D": "Left-to-right vs. right-to-left edges"}, "answer": "C", "explanation": "Positive = user interacted with item. Negative = sampled pair with no interaction. BPR encourages $$\\hat{y}_{ui} > \\hat{y}_{uj}$$.", "tier": "Tier 4 \u2014 Moderate"}, {"num": 85, "question": "LightGCN Binary Weakness\nMain weakness of LightGCN's binary interaction approach?", "options": {"A": "Can't handle large graphs", "B": "Treats all interactions equally (click = purchase), losing granularity", "C": "Requires explicit ratings", "D": "Can't learn from negative feedback"}, "answer": "B", "explanation": "Binary edges mean a casual view = a purchase. Can't distinguish interest levels.", "tier": "Tier 4 \u2014 Moderate"}, {"num": 86, "question": "Shallow vs. Deep Embeddings\nKey difference between node2vec (shallow) and GNNs (deep)?", "options": {"A": "Shallow uses more parameters", "B": "Deep can't handle graphs", "C": "Shallow always outperforms deep", "D": "Shallow learns lookup tables; deep learns via neighborhood aggregation"}, "answer": "D", "explanation": "Shallow methods learn separate vectors per node. Deep methods (GNNs) aggregate neighbor information \u2014 enabling generalization to unseen nodes.", "tier": "Tier 4 \u2014 Moderate"}, {"num": 87, "question": "Girvan-Newman Algorithm\nCorrect order of Girvan-Newman steps?", "options": {"A": "Compute edge betweenness \u2192 remove highest \u2192 recompute \u2192 repeat", "B": "Compute node centrality \u2192 remove lowest \u2192 form communities", "C": "Remove random edges \u2192 compute modularity", "D": "Assign random communities \u2192 optimize by swapping"}, "answer": "A", "explanation": "Top-down/divisive: iteratively remove bridge edges to reveal community structure.", "tier": "Tier 4 \u2014 Moderate"}, {"num": 88, "question": "Louvain vs. Girvan-Newman\nMain difference?", "options": {"A": "Louvain is top-down; GN is bottom-up", "B": "Louvain uses edge betweenness", "C": "Louvain is bottom-up (agglomerative); GN is top-down (divisive)", "D": "Louvain requires number of communities as input"}, "answer": "C", "explanation": "GN removes edges (divisive). Louvain merges nodes to maximize modularity (agglomerative). Louvain runs in $$O(n \\log n)$$ \u2014 much faster.", "tier": "Tier 4 \u2014 Moderate"}, {"num": 89, "question": "Louvain Advantage\nAdvantage of Louvain over Girvan-Newman?", "options": {"A": "Runs in approximately linear time, scales to large networks", "B": "Guarantees global optimum", "C": "Requires no objective function", "D": "Only works on directed graphs"}, "answer": "A", "explanation": "Louvain: $$O(n \\log n)$$. GN: $$O(m^2 n)$$. Louvain is practical for millions of nodes.", "tier": "Tier 4 \u2014 Moderate"}, {"num": 90, "question": "Demographic Parity\nDemographic parity requires:", "options": {"A": "Equal accuracy across groups", "B": "Equal positive prediction rate across groups", "C": "Equal false positive rate across groups", "D": "Ignoring all demographic features"}, "answer": "B", "explanation": "$$P(\\hat{Y}=1 | G=a) = P(\\hat{Y}=1 | G=b)$$. Equal outcomes regardless of group.", "tier": "Tier 4 \u2014 Moderate"}, {"num": 91, "question": "Counterfactual Fairness\nCounterfactual fairness requires:", "options": {"A": "Prediction unchanged if sensitive attribute were flipped", "B": "Equal accuracy across groups", "C": "Never using demographic info", "D": "Equal F // ===== STATE =====
let state = {
  course: null,
  questions: [],
  currentIndex: 0,
  score: 0,
  answered: 0,
  answers: [], // {qIndex, selected, correct, isCorrect, timeSpent}
  theme: localStorage.getItem('quiz-theme') || 'light',
  totalStartTime: null,
  questionStartTime: null,
  timerInterval: null,
  totalElapsed: 0
};

// ===== THEME =====
function initTheme() {
  // Check system preference if no saved preference
  if (!localStorage.getItem('quiz-theme')) {
    if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
      state.theme = 'dark';
    }
  }
  if (state.theme === 'dark') {
    document.documentElement.setAttribute('data-theme', 'dark');
    document.querySelector('.theme-toggle').textContent = '☀️';
  }
  // Listen for system theme changes
  window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
    if (!localStorage.getItem('quiz-theme')) {
      state.theme = e.matches ? 'dark' : 'light';
      applyTheme();
    }
  });
}
function applyTheme() {
  if (state.theme === 'dark') {
    document.documentElement.setAttribute('data-theme', 'dark');
    document.querySelector('.theme-toggle').textContent = '☀️';
  } else {
    document.documentElement.removeAttribute('data-theme');
    document.querySelector('.theme-toggle').textContent = '🌙';
  }
}
function toggleTheme() {
  state.theme = state.theme === 'light' ? 'dark' : 'light';
  localStorage.setItem('quiz-theme', state.theme);
  if (state.theme === 'dark') {
    document.documentElement.setAttribute('data-theme', 'dark');
    document.querySelector('.theme-toggle').textContent = '☀️';
  } else {
    document.documentElement.removeAttribute('data-theme');
    document.querySelector('.theme-toggle').textContent = '🌙';
  }
}

// ===== NAVIGATION =====
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if (id === 'screen-course') {
    document.getElementById('header-title').textContent = '📝 CMPE Exam Prep';
    document.getElementById('timer-display').style.display = 'none';
    if (state.timerInterval) clearInterval(state.timerInterval);
  }
}

// ===== TIMER =====
function formatTime(seconds) {
  const m = Math.floor(seconds / 60);
  const s = seconds % 60;
  return String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
}
function startTimer() {
  state.totalStartTime = Date.now();
  state.questionStartTime = Date.now();
  document.getElementById('timer-display').style.display = 'inline-block';
  if (state.timerInterval) clearInterval(state.timerInterval);
  state.timerInterval = setInterval(() => {
    const totalSec = Math.floor((Date.now() - state.totalStartTime) / 1000);
    const qSec = Math.floor((Date.now() - state.questionStartTime) / 1000);
    document.getElementById('total-timer').textContent = formatTime(totalSec);
    document.getElementById('q-timer').textContent = 'Q: ' + formatTime(qSec);
  }, 1000);
}
function stopTimer() {
  if (state.timerInterval) clearInterval(state.timerInterval);
  state.totalElapsed = Math.floor((Date.now() - state.totalStartTime) / 1000);
  document.getElementById('timer-display').style.display = 'none';
}
function resetQuestionTimer() {
  state.questionStartTime = Date.now();
}
function getQuestionTime() {
  return Math.floor((Date.now() - state.questionStartTime) / 1000);
}

// ===== COURSE SELECTION =====
const COURSE_TITLES = {
  cmpe260: 'CMPE 260 — Reinforcement Learning',
  cmpe256: 'CMPE 256 — Recommender Systems'
};
function selectCourse(course) {
  state.course = course;
  document.getElementById('mode-title').textContent = COURSE_TITLES[course];
  document.getElementById('mode-subtitle').textContent = '100 questions available';
  document.getElementById('header-title').textContent = COURSE_TITLES[course];
  showScreen('screen-mode');
}

// ===== SHUFFLE =====
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ===== START QUIZ =====
function startQuiz(count) {
  const allQ = QUESTIONS[state.course];
  const shuffled = shuffle(allQ);
  state.questions = shuffled.slice(0, Math.min(count, shuffled.length));
  state.currentIndex = 0;
  state.score = 0;
  state.answered = 0;
  state.answers = [];
  const modeLabel = count >= 100 ? 'All 100' : `Quick ${count}`;
  document.getElementById('header-title').textContent = `${COURSE_TITLES[state.course]} · ${modeLabel}`;
  showScreen('screen-quiz');
  startTimer();
  renderQuestion();
}

// ===== RENDER QUESTION =====
function renderQuestion() {
  const q = state.questions[state.currentIndex];
  const total = state.questions.length;
  const idx = state.currentIndex;

  // Check if this question was already answered
  const prevAnswer = state.answers.find(a => a.qIndex === idx);

  // Progress
  document.getElementById('progress-bar').style.width = ((idx / total) * 100) + '%';
  document.getElementById('progress-label').textContent = `Question ${idx + 1} of ${total}`;
  document.getElementById('score-label').textContent = `Score: ${state.score}/${state.answered}`;

  // Previous button visibility
  document.getElementById('prev-btn').style.display = idx > 0 ? 'inline-block' : 'none';

  // Question
  document.getElementById('q-tier').textContent = q.tier;
  document.getElementById('q-number').textContent = `Q${q.num}`;
  document.getElementById('q-text').innerHTML = q.question.replace(/\n/g, '<br>');

  // Options
  const container = document.getElementById('options-container');
  container.innerHTML = '';
  ['A', 'B', 'C', 'D'].forEach(letter => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `<div class="option-content"><span class="option-letter">${letter}</span><span class="option-text">${q.options[letter]}</span></div>`;
    btn.dataset.letter = letter;

    if (prevAnswer) {
      // Already answered — show in review mode
      btn.classList.add('disabled');
      btn.onclick = null;
      if (letter === prevAnswer.correct) btn.classList.add('correct');
      if (letter === prevAnswer.selected && !prevAnswer.isCorrect) btn.classList.add('wrong');
    } else {
      btn.onclick = () => selectAnswer(letter);
    }
    container.appendChild(btn);
  });

  // Feedback
  const fb = document.getElementById('feedback');
  const nextBtn = document.getElementById('next-btn');
  if (prevAnswer) {
    // Show feedback for previously answered question
    fb.style.display = 'block';
    if (prevAnswer.isCorrect) {
      fb.className = 'feedback correct-fb';
      document.getElementById('fb-title').textContent = '✅ Correct!';
    } else {
      fb.className = 'feedback wrong-fb';
      document.getElementById('fb-title').textContent = `❌ Wrong — Correct answer is ${prevAnswer.correct}`;
    }
    document.getElementById('fb-explanation').innerHTML = q.explanation.replace(/\n/g, '<br>');
    // Show next button
    if (idx < total - 1) {
      nextBtn.textContent = 'Next Question →';
      nextBtn.style.display = 'block';
    } else {
      nextBtn.textContent = 'View Results →';
      nextBtn.style.display = 'block';
    }
  } else {
    fb.style.display = 'none';
    fb.className = 'feedback';
    nextBtn.style.display = 'none';
  }

  // Re-render MathJax
  typesetMath();
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function typesetMath() {
  if (window.MathJax && MathJax.typesetPromise) {
    MathJax.typesetPromise().catch(err => console.log('MathJax error:', err));
  }
}

// ===== SELECT ANSWER =====
function selectAnswer(selected) {
  const q = state.questions[state.currentIndex];
  const correct = q.answer;
  const isCorrect = selected === correct;

  state.answered++;
  if (isCorrect) state.score++;

  const timeSpent = getQuestionTime();
  state.answers.push({
    qIndex: state.currentIndex,
    question: q,
    selected,
    correct,
    isCorrect,
    timeSpent
  });

  // Disable all options
  const btns = document.querySelectorAll('.option-btn');
  btns.forEach(btn => {
    btn.classList.add('disabled');
    btn.onclick = null;
    const letter = btn.dataset.letter;
    if (letter === correct) btn.classList.add('correct');
    if (letter === selected && !isCorrect) btn.classList.add('wrong');
  });

  // Show feedback
  const fb = document.getElementById('feedback');
  fb.style.display = 'block';
  if (isCorrect) {
    fb.className = 'feedback correct-fb';
    document.getElementById('fb-title').textContent = '✅ Correct!';
  } else {
    fb.className = 'feedback wrong-fb';
    document.getElementById('fb-title').textContent = `❌ Wrong — Correct answer is ${correct}`;
  }
  document.getElementById('fb-explanation').innerHTML = q.explanation.replace(/\n/g, '<br>');

  // Update score display
  document.getElementById('score-label').textContent = `Score: ${state.score}/${state.answered}`;

  // Show next button
  const nextBtn = document.getElementById('next-btn');
  if (state.currentIndex < state.questions.length - 1) {
    nextBtn.textContent = 'Next Question →';
  } else {
    nextBtn.textContent = 'View Results →';
  }
  nextBtn.style.display = 'block';

  typesetMath();
}

// ===== PREVIOUS QUESTION =====
function prevQuestion() {
  if (state.currentIndex > 0) {
    state.currentIndex--;
    renderQuestion();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
}

// ===== NEXT QUESTION =====
function nextQuestion() {
  state.currentIndex++;
  if (state.currentIndex >= state.questions.length) {
    showSummary();
  } else {
    resetQuestionTimer();
    renderQuestion();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
}

// ===== SUMMARY =====
function showSummary() {
  stopTimer();
  showScreen('screen-summary');
  const total = state.questions.length;
  const pct = Math.round((state.score / total) * 100);

  document.getElementById('final-score').textContent = `${state.score} / ${total}`;
  document.getElementById('final-pct').textContent = `${pct}% correct · ${formatTime(state.totalElapsed)} total`;

  const bar = document.getElementById('score-bar');
  bar.style.width = '0%';
  bar.style.background = pct >= 70 ? 'var(--correct)' : pct >= 50 ? '#ff9f0a' : 'var(--wrong)';
  setTimeout(() => { bar.style.width = pct + '%'; }, 100);

  document.getElementById('header-title').textContent = `${COURSE_TITLES[state.course]} · Results`;
  renderReviewList('all');
}

function renderReviewList(filter) {
  const list = document.getElementById('review-list');
  list.innerHTML = '';

  state.answers.forEach((a, i) => {
    if (filter === 'wrong' && a.isCorrect) return;
    if (filter === 'correct' && !a.isCorrect) return;

    const item = document.createElement('div');
    item.className = `review-item ${a.isCorrect ? 'review-correct' : 'review-wrong'}`;

    let detail = '';
    if (!a.isCorrect) {
      detail = `<div class="review-detail">
        Your answer: <strong>${a.selected}) ${a.question.options[a.selected]}</strong><br>
        Correct: <strong>${a.correct}) ${a.question.options[a.correct]}</strong>
        <span style="color:var(--text2);font-size:0.8rem;margin-left:8px">⏱ ${formatTime(a.timeSpent)}</span><br>
        <em>${a.question.explanation}</em>
      </div>`;
    } else {
      detail = `<div class="review-detail">✅ Answered: ${a.correct} <span style="color:var(--text2);font-size:0.8rem;margin-left:8px">⏱ ${formatTime(a.timeSpent)}</span></div>`;
    }

    item.innerHTML = `
      <div class="review-q">${a.isCorrect ? '✅' : '❌'} Q${a.question.num}. ${a.question.question.substring(0, 120)}${a.question.question.length > 120 ? '...' : ''}</div>
      ${detail}
    `;
    list.appendChild(item);
  });

  typesetMath();
}

function filterReview(filter, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderReviewList(filter);
}

// ===== RESTART =====
function restartQuiz() {
  startQuiz(state.questions.length);
}

// ===== INIT =====
initTheme();
</script>
